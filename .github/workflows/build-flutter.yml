name: Flutter Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            build-cmd: flutter build apk --release
            artifact-name: app-release
            artifact-path: build/app/outputs/flutter-apk/app-release.apk
          - platform: ios
            os: macos-latest
            build-cmd: flutter build ios --release --no-codesign
            artifact-name: ios-release
            artifact-path: build/ios/iphoneos/FlutterIpaExport.ipa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Java must be set up before Flutter for Android builds
      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true

      # Use the pre-installed Android SDK sdkmanager to add only the required NDK
      - name: Install Android NDK
        if: matrix.platform == 'android'
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"

      - name: Cache Gradle
        if: matrix.platform == 'android'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Build
        run: ${{ matrix.build-cmd }}

      - name: Create IPA
        if: matrix.platform == 'ios'
        run: |
          mkdir build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
